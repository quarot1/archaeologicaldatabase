<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Archaeological Sites Map</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #ui {
      position: absolute;
      z-index: 1000;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 6px;
      font-family: sans-serif;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    button {
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="ui">
  <button onclick="loadSites()">Reload sites</button>
  <div id="status">Move map & click reload</div>
</div>

<div id="map"></div>

<script>
  // 1. Create map (global view default)
  const map = L.map('map').setView([20, 0], 2);

  // 2. OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // 3. Layer group so we can clear old results
  const siteLayer = L.layerGroup().addTo(map);

  // 4. Red dot style
  function addRedDot(lat, lon, name) {
    L.circleMarker([lat, lon], {
      radius: 5,
      color: "red",
      fillColor: "red",
      fillOpacity: 0.9,
      weight: 1
    })
    .addTo(siteLayer)
    .bindPopup(name || "Archaeological site");
  }

  // 5. Load sites based on CURRENT map view
  async function loadSites() {
    document.getElementById("status").innerText = "Loading...";

    // clear previous results
    siteLayer.clearLayers();

    const bounds = map.getBounds();

    const south = bounds.getSouth();
    const west = bounds.getWest();
    const north = bounds.getNorth();
    const east = bounds.getEast();

    const query = `
      [out:json];
      node["historic"="archaeological_site"](${south},${west},${north},${east});
      out;
    `;

    const url =
      "https://overpass-api.de/api/interpreter?data=" +
      encodeURIComponent(query);

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error("Overpass error");

      const data = await res.json();

      let count = 0;

      data.elements.forEach(el => {
        if (el.lat && el.lon) {
          addRedDot(el.lat, el.lon, el.tags?.name);
          count++;
        }
      });

      document.getElementById("status").innerText =
        `Loaded ${count} sites`;

    } catch (err) {
      console.error(err);
      document.getElementById("status").innerText =
        "Failed to load sites (try again)";
    }
  }

  // optional auto-load on start
  loadSites();
</script>

</body>
</html>
